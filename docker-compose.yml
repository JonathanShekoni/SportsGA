services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sportsga
      POSTGRES_PASSWORD: sportsga
      POSTGRES_DB: sportsga
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportsga -d sportsga"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./Backend
    ports:
      - "5000:8000"
    environment:
      DATABASE_URL: postgresql://sportsga:sportsga@db:5432/sportsga
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
